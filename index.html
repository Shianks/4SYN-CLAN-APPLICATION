<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tournament Scorer</title>
    <style>
        :root { --discord-blurple: #7289da; --gold: #f1c40f; --silver: #bdc3c7; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--discord-blurple); padding-bottom: 15px; margin-bottom: 20px; }
        .map-badge { background: var(--discord-blurple); padding: 8px 20px; border-radius: 5px; font-weight: bold; font-size: 1.1em; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: #252525; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        th { background: #111; color: var(--discord-blurple); font-size: 0.85em; text-transform: uppercase; }

        .winners-box { background: linear-gradient(145deg, #2d2d2d, #1a1a1a); padding: 20px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 20px; text-align: center;}
        .podium { display: flex; justify-content: space-around; align-items: flex-end; margin-top: 10px; }
        .gold { color: var(--gold); font-size: 1.5em; font-weight: bold; } 
        .silver { color: var(--silver); font-size: 1.2em; } 
        .bronze { color: var(--bronze); font-size: 1.1em; }

        .history-log { background: #111; padding: 15px; border-radius: 8px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.85em; border: 1px solid #333; }
        .log-entry { border-bottom: 1px solid #222; padding: 8px 0; color: #888; text-align: left; }

        input { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 3px; width: 60px; }
        .btn { padding: 10px 18px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; text-transform: uppercase; font-size: 0.8em; }
        .btn-update { background: #27ae60; color: white; width: 100%; margin-top: 10px; font-size: 1em; }
        .btn-ss { background: #9b59b6; color: white; }
        .btn-reset { background: #c0392b; color: white; }
        
        /* SCREENSHOT MODE STYLES */
        body.ss-mode { background: #000; padding: 40px; }
        body.ss-mode .no-ss, body.ss-mode .history-sidebar, body.ss-mode input { display: none !important; }
        body.ss-mode .main-grid { grid-template-columns: 1fr; }
        body.ss-mode .container { border-color: var(--discord-blurple); box-shadow: 0 0 40px rgba(114, 137, 218, 0.2); }
        #exitSS { display: none; position: fixed; top: 10px; right: 10px; z-index: 1000; background: #e74c3c; }
        body.ss-mode #exitSS { display: block; }
    </style>
</head>
<body>

<button id="exitSS" class="btn" onclick="toggleScreenshot()">✕ Exit Screenshot Mode</button>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">🏆 TOURNAMENT STANDINGS</h2>
            <span id="dateTime" style="font-size: 0.8em; color: #777;"></span>
        </div>
        <div id="mapCounter" class="map-badge">MAP 1</div>
    </div>

    <div class="winners-box">
        <h3 style="margin:0; color: var(--gold); letter-spacing: 2px;">⭐ TOP 3 WINNERS ⭐</h3>
        <div class="podium" id="podiumUI">
            <div class="silver">🥈 2nd: ---</div>
            <div class="gold">🥇 CHAMPION: ---</div>
            <div class="bronze">🥉 3rd: ---</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="table-section">
            <div class="no-ss" style="margin-bottom: 15px; background: #111; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <label>Teams:</label>
                    <input type="number" id="teamCount" value="20">
                    <button onclick="setupTeams()" class="btn" style="background: #3498db; color: white; padding: 5px 10px;">Init</button>
                </div>
                <div>
                    <button onclick="toggleScreenshot()" class="btn btn-ss">📸 Screenshot Mode</button>
                    <button onclick="fullReset()" class="btn btn-reset">Reset</button>
                </div>
            </div>

            <div id="setupSection" style="display:none;">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Team Name</th>
                            <th class="no-ss">Rank</th>
                            <th class="no-ss">Kills</th>
                            <th>Total Points</th>
                        </tr>
                    </thead>
                    <tbody id="entryBody"></tbody>
                </table>
                <button class="btn btn-update no-ss" onclick="processMap()">Update Map & Sync Discord</button>
            </div>
        </div>

        <div class="history-sidebar">
            <h3 style="margin-top:0;">📜 History Log</h3>
            <div class="history-log" id="historyLog">
                <div class="log-entry">Awaiting Map 1...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1465319966214717551/TJkxG_fCB0JRQqM2u8dgK3WhmMMERJE8SoZjiC_LHqmfdG1PCg6vgVGecztN0v8r77O4";
    
    let teams = [];
    let currentMap = 1;
    const placementPoints = { 1:10, 2:8, 3:6, 4:4, 5:4, 6:2, 7:1, 8:1, 9:1, 10:1 };

    function toggleScreenshot() { document.body.classList.toggle('ss-mode'); }

    function setupTeams() {
        const count = document.getElementById('teamCount').value;
        const entryBody = document.getElementById('entryBody');
        entryBody.innerHTML = '';
        teams = [];
        for (let i = 1; i <= count; i++) {
            teams.push({ name: `Team ${i}`, totalPoints: 0 });
            renderRow(i, `Team ${i}`, 0);
        }
        document.getElementById('setupSection').style.display = 'block';
    }

    function renderRow(displayRank, name, points) {
        document.getElementById('entryBody').innerHTML += `
            <tr>
                <td>${displayRank}</td>
                <td><input type="text" value="${name}" class="team-name-input" data-idx="${displayRank-1}" style="width: 140px; border:none; background:transparent;"></td>
                <td class="no-ss"><input type="number" class="map-rank" placeholder="Rank" value="11"></td>
                <td class="no-ss"><input type="number" class="map-kills" placeholder="Kills" value="0"></td>
                <td style="font-weight:bold; color: #27ae60;">${points}</td>
            </tr>
        `;
    }

    function processMap() {
        const nameInputs = document.querySelectorAll('.team-name-input');
        const rankInputs = document.querySelectorAll('.map-rank');
        const killInputs = document.querySelectorAll('.map-kills');
        let logText = `<strong>MAP ${currentMap} UPDATE</strong><br>`;

        teams.forEach((t, i) => {
            const r = parseInt(rankInputs[i].value);
            const k = parseInt(killInputs[i].value);
            const p = placementPoints[r] || 0;
            const mapScore = p + k;

            t.name = nameInputs[i].value;
            t.totalPoints += mapScore;
            if (mapScore > 0) logText += `• ${t.name}: +${mapScore}pts<br>`;
        });

        teams.sort((a, b) => b.totalPoints - a.totalPoints);
        
        // Refresh Table
        document.getElementById('entryBody').innerHTML = '';
        teams.forEach((t, i) => renderRow(i + 1, t.name, t.totalPoints));

        addToHistory(logText);
        updatePodium();
        sendDiscord();
        
        currentMap++;
        document.getElementById('mapCounter').innerText = `MAP ${currentMap}`;
        document.getElementById('dateTime').innerText = "Last Updated: " + new Date().toLocaleString();
    }

    function updatePodium() {
        const pUI = document.getElementById('podiumUI');
        if (teams.length >= 3) {
            pUI.innerHTML = `
                <div class="silver">🥈 2nd: ${teams[1].name} <br> <span style="font-size:0.6em;">${teams[1].totalPoints} PTS</span></div>
                <div class="gold">🥇 CHAMPION: ${teams[0].name} <br> <span style="font-size:0.6em;">${teams[0].totalPoints} PTS</span></div>
                <div class="bronze">🥉 3rd: ${teams[2].name} <br> <span style="font-size:0.6em;">${teams[2].totalPoints} PTS</span></div>
            `;
        }
    }

    function addToHistory(html) {
        const log = document.getElementById('historyLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = html;
        log.prepend(entry);
    }

    async function sendDiscord() {
        const top10 = teams.slice(0, 10);
        let content = `**📍 FINAL STANDINGS - MAP ${currentMap-1}**\n`;
        top10.forEach((t, i) => {
            let icon = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
            content += `${icon} **${t.name}**: ${t.totalPoints} pts\n`;
        });
        try { await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content }) }); } catch (e) {}
    }

    function fullReset() {
        if(confirm("Wipe all data?")) {
            currentMap = 1;
            document.getElementById('mapCounter').innerText = "MAP 1";
            document.getElementById('historyLog').innerHTML = "";
            setupTeams();
            updatePodium();
        }
    }
</script>
</body>
</html>
