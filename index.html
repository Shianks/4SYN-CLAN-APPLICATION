<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Point Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #7289da; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #36393f; }
        th, td { padding: 12px; border: 1px solid #444; text-align: center; }
        th { background: #202225; color: #b9bbbe; text-transform: uppercase; font-size: 12px; }
        .top-3 { background: rgba(39, 174, 96, 0.2); font-weight: bold; border-left: 5px solid #27ae60; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #40444b; color: white; width: 80%; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #202225; padding: 15px; border-radius: 8px; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #27ae60; color: white; }
        .btn-add:hover { background: #219150; }
        .btn-save { background: #f1c40f; color: black; }
        .btn-discord { background: #7289da; color: white; }
        .rank-highlight { color: #f1c40f; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 Tournament Point Scorer</h2>
    <p id="dateTime" style="color: #8e9297;"></p>

    <div class="controls">
        <label>Number of Teams:</label>
        <input type="number" id="teamCount" value="20" min="1" max="50" style="width: 60px;">
        <button class="btn btn-add" onclick="setupTeams()">Initialize Lobby</button>
        <button class="btn btn-save" onclick="saveToLocal()">💾 Save Progress</button>
        <span style="font-size: 0.8em; color: #aaa;">(Webhook Linked)</span>
    </div>

    <div id="setupSection" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Input Match Results</h3>
            <div id="mapIndicator" style="font-weight: bold; color: #7289da;">Map Data Entry</div>
        </div>
        
        <table id="entryTable">
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Rank (1-10)</th>
                    <th>Kills</th>
                </tr>
            </thead>
            <tbody id="entryBody"></tbody>
        </table>
        <br>
        <button class="btn btn-discord" style="width: 100%; font-size: 1.1em;" onclick="calculatePoints()">Update Standings & Send to Discord</button>
    </div>

    <hr style="border: 0.5px solid #444; margin: 30px 0;">

    <h3>📊 Current Leaderboard</h3>
    <table id="leaderboard">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Total Points</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
    </table>
</div>

<script>
    // YOUR WEBHOOK IS EMBEDDED HERE
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1465319966214717551/TJkxG_fCB0JRQqM2u8dgK3WhmMMERJE8SoZjiC_LHqmfdG1PCg6vgVGecztN0v8r77O4";
    
    let teams = [];
    const placementPoints = { 1:10, 2:8, 3:6, 4:4, 5:4, 6:2, 7:1, 8:1, 9:1, 10:1 };

    document.getElementById('dateTime').innerText = "Last Updated: " + new Date().toLocaleString();

    function setupTeams() {
        const count = document.getElementById('teamCount').value;
        const entryBody = document.getElementById('entryBody');
        entryBody.innerHTML = '';
        teams = [];

        for (let i = 1; i <= count; i++) {
            let teamName = `Team ${i}`;
            teams.push({ name: teamName, totalPoints: 0 });
            entryBody.innerHTML += `
                <tr>
                    <td><input type="text" value="${teamName}" id="name-${i}"></td>
                    <td><input type="number" id="rank-${i}" min="1" placeholder="Rank" value="11"></td>
                    <td><input type="number" id="kills-${i}" min="0" placeholder="Kills" value="0"></td>
                </tr>
            `;
        }
        document.getElementById('setupSection').style.display = 'block';
    }

    function calculatePoints() {
        // Reset and Calculate based on inputs
        teams.forEach((t, index) => {
            const i = index + 1;
            const rank = parseInt(document.getElementById(`rank-${i}`).value);
            const kills = parseInt(document.getElementById(`kills-${i}`).value);
            const pPoints = placementPoints[rank] || 0;
            
            t.name = document.getElementById(`name-${i}`).value;
            // Add current match points to their running total
            t.totalPoints += (pPoints + kills);
            
            // Clear inputs for next map entry
            document.getElementById(`rank-${i}`).value = 11;
            document.getElementById(`kills-${i}`).value = 0;
        });

        renderLeaderboard();
        sendDiscord();
    }

    function renderLeaderboard() {
        const lbBody = document.getElementById('leaderboardBody');
        teams.sort((a, b) => b.totalPoints - a.totalPoints);
        
        lbBody.innerHTML = '';
        teams.forEach((t, index) => {
            let status = "";
            let rowClass = "";
            if (index === 0) { status = "🏆 CHAMPION"; rowClass = "top-3"; }
            else if (index === 1) { status = "🥈 2nd PLACE"; rowClass = "top-3"; }
            else if (index === 2) { status = "🥉 3rd PLACE"; rowClass = "top-3"; }

            lbBody.innerHTML += `
                <tr class="${rowClass}">
                    <td class="${index < 3 ? 'rank-highlight' : ''}">${index + 1}</td>
                    <td>${t.name}</td>
                    <td>${t.totalPoints}</td>
                    <td style="font-size: 0.8em;">${status}</td>
                </tr>
            `;
        });
    }

    function saveToLocal() {
        localStorage.setItem('tournamentData', JSON.stringify(teams));
        alert("Progress saved to your browser!");
    }

    async function sendDiscord() {
        let content = `**📊 TOURNAMENT UPDATE - ${new Date().toLocaleString()}**\n----------------------------------\n`;
        teams.slice(0, 10).forEach((t, i) => {
            let medal = i === 0 ? "🥇 " : i === 1 ? "🥈 " : i === 2 ? "🥉 " : "🔹 ";
            content += `${medal}**${t.name}**: ${t.totalPoints} pts\n`;
        });

        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });
            alert("Leaderboard updated and sent to Discord!");
        } catch (e) {
            alert("Error sending to Discord. Check your connection.");
        }
    }
</script>

</body>
</html>
