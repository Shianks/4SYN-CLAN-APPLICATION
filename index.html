<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4SYN | Recruitment</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --accent-red: #8b0000;
            --dark-bg: #0a0a0a;
            --glass: rgba(15, 15, 15, 0.92);
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 0, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            max-width: 550px;
            width: 100%;
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px var(--gold-glow);
            position: relative;
        }

        /* --- GLASS TOOLTIP CSS --- */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            color: var(--primary-gold);
            font-weight: bold;
            text-decoration: underline dotted;
            margin-left: 5px;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 260px;
            background: rgba(255, 255, 255, 0.07); /* Transparent white */
            backdrop-filter: blur(12px);          /* Glass blur */
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            text-align: left;
            border-radius: 12px;
            padding: 15px;
            position: absolute;
            z-index: 10;
            bottom: 150%; 
            left: 50%;
            margin-left: -130px;
            opacity: 0;
            transition: all 0.4s ease;
            transform: translateY(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            font-size: 0.8rem;
            line-height: 1.5;
            pointer-events: none;
        }

        /* Tooltip Arrow */
        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(212, 175, 55, 0.3) transparent transparent transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .perks-list {
            margin: 0;
            padding-left: 15px;
            list-style-type: '⚡ ';
        }
        /* ------------------------- */

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 120px; filter: drop-shadow(0 0 10px var(--primary-gold)); }

        h1 {
            text-align: center;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.6rem;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-gold);
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card:hover { border-color: var(--primary-gold); background: rgba(212, 175, 55, 0.05); }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: transparent;
            color: white;
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        button:hover { background: var(--primary-gold); color: black; box-shadow: 0 0 20px var(--primary-gold); }

        .footer-text { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 30px; letter-spacing: 1px; }
        .required-star { color: #ff4d4d; margin-left: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="clan.jpg" alt="4SYN Logo">
    </div>
    
    <h1>4SYN Recruitment</h1>

    <form id="recruitmentForm">
        <div class="form-group">
            <label>In-Game Name & UID <span class="required-star">*</span></label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="ign" placeholder="IGN" style="width: 50%;" required>
                <input type="text" id="uid" placeholder="Game UID" style="width: 50%;" required>
            </div>
        </div>

        <div class="form-group">
            <label>Playstyle <span class="required-star">*</span></label>
            <div class="option-grid">
                <label class="option-card">
                    <input type="radio" name="playstyle" value="Competitive" required> 
                    Competitive 
                    <span class="tooltip">(?)
                        <span class="tooltiptext">
                            <strong style="color:var(--primary-gold)">Competitive Perks:</strong><br>
                            <ul class="perks-list">
                                <li>Daily scrimmages</li>
                                <li>Monthly cash/gold rewards</li>
                                <li>Active teammates & rank push</li>
                                <li>Clan tournaments & events</li>
                                <li>Friendly & non-toxic community</li>
                            </ul>
                        </span>
                    </span>
                </label>
                
                <label class="option-card">
                    <input type="radio" name="playstyle" value="Casual"> 
                    Casual
                    <span class="tooltip">(?)
                        <span class="tooltiptext">
                            <strong style="color:var(--primary-gold)">Casual Perks:</strong><br>
                            <ul class="perks-list">
                                <li>Improve skills & play with better teammates</li>
                                <li>Respectful community</li>
                                <li>Supportive environment</li>
                                <li>Monthly clan events with prizes</li>
                                <li>Make new friends</li>
                            </ul>
                        </span>
                    </span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Platform <span class="required-star">*</span></label>
            <div class="option-grid">
                <label class="option-card"><input type="radio" name="platform" value="PC" required> PC</label>
                <label class="option-card"><input type="radio" name="platform" value="Mobile"> Mobile</label>
            </div>
        </div>

        <div class="form-group">
            <label>Discord Username <span class="required-star">*</span></label>
            <input type="text" id="discordUser" placeholder="e.g. username" required>
        </div>

        <div class="form-group">
            <label>Age & Nationality <span class="required-star">*</span></label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="age" placeholder="Age" style="width: 30%;" required>
                <input type="text" id="nationality" placeholder="Nationality" style="width: 70%;" required>
            </div>
        </div>

        <div class="form-group">
            <label>Working Microphone? <span class="required-star">*</span></label>
            <select id="hasMic" required>
                <option value="" disabled selected>Choose an option...</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Listen Only">I can listen only</option>
            </select>
        </div>

        <div class="form-group">
            <label>Why do you want to join 4SYN? <span class="required-star">*</span></label>
            <textarea id="whyJoin" rows="3" placeholder="Tell us about yourself..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit Application</button>
    </form>
    
    <p class="footer-text">QUALIFIED APPLICANTS WILL BE CONTACTED VIA DISCORD</p>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1454879705768525865/zsvUUI2W1wteTuVcQBf077wzxMhrLgByTAA525-l-O-9pRHKzT0RMI1J2RMmrLRuQ7Os";
    document.getElementById('recruitmentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "TRANSMITTING...";
        btn.disabled = true;

        const platformValue = document.querySelector('input[name="platform"]:checked').value;
        const playstyleValue = document.querySelector('input[name="playstyle"]:checked').value;

        const data = {
            ign: document.getElementById('ign').value,
            uid: document.getElementById('uid').value,
            platform: platformValue,
            playstyle: playstyleValue,
            discord: document.getElementById('discordUser').value,
            age: document.getElementById('age').value,
            nat: document.getElementById('nationality').value,
            mic: document.getElementById('hasMic').value,
            why: document.getElementById('whyJoin').value,
            prev: "None",
            tag: "Immediately"
        };

        const params = {
            username: "4SYN Recruitment Bot",
            embeds: [{
                title: "📜 NEW RECRUITMENT APPLICATION",
                color: 13936183, 
                fields: [
                    { name: "👤 IGN", value: data.ign, inline: true },
                    { name: "🆔 Game UID", value: data.uid, inline: true },
                    { name: "⚔️ Playstyle", value: data.playstyle, inline: true },
                    { name: "🎮 Platform", value: data.platform, inline: true },
                    { name: "💬 Discord Username", value: data.discord, inline: true },
                    { name: "🎂 Age", value: data.age, inline: true },
                    { name: "🌍 Nationality", value: data.nat, inline: true },
                    { name: "🎙️ Microphone", value: data.mic, inline: true },
                    { name: "📝 Why 4SYN?", value: data.why }
                ],
                footer: { text: "4SYN Clan Management System" },
                timestamp: new Date()
            }]
        };

        fetch(webhookURL, {
            method: "POST",
            headers: { 'Content-type': 'application/json' },
            body: JSON.stringify(params)
        }).then(res => {
            alert("Application Sent Successfully! Good luck.");
            location.reload();
        }).catch(err => {
            alert("Submission failed.");
            btn.disabled = false;
            btn.innerText = "Submit Application";
        });
    });
</script>

</body>
</html>
