<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4SYN | Recruitment</title>

<style>
:root {
    --primary-gold: #d4af37;
    --gold-glow: rgba(212, 175, 55, 0.4);
    --accent-red: #8b0000;
    --dark-bg: #0a0a0a;
    --glass: rgba(15, 15, 15, 0.92);
}

/* BACKGROUND */
body {
    background-color: var(--dark-bg);
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(139,0,0,0.2), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(212,175,55,0.12), transparent 40%);
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
}

/* INTRO */
#intro-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.8s;
}

.intro-content {
    max-width: 600px;
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(212,175,55,0.3);
    background: rgba(255,255,255,0.03);
    box-shadow: 0 0 40px black, 0 0 20px var(--gold-glow);
}

/* LOGO */
.intro-logo img {
    width: 100px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 15px var(--primary-gold));
}

/* TITLE */
.intro-title {
    color: var(--primary-gold);
    letter-spacing: 5px;
    font-size: 1.6rem;
}

/* TEXT */
.intro-text {
    color: #ccc;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 30px;
}

/* LEADERS */
.leadership-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    margin-bottom: 30px;
}

.leader-card {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(212,175,55,0.2);
    padding: 12px;
    border-radius: 10px;
    transition: 0.3s;
}

.leader-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary-gold);
}

/* IMAGE */
.leader-img {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary-gold);
    box-shadow: 0 0 12px var(--gold-glow);
    margin-bottom: 8px;
    transition: 0.3s;
}

.leader-card:hover .leader-img {
    transform: scale(1.1);
}

/* TEXT */
.leader-role {
    display: block;
    font-size: 0.65rem;
    color: var(--primary-gold);
}

.leader-name {
    font-weight: bold;
}

/* BUTTON */
.btn-proceed {
    background: linear-gradient(135deg,#d4af37,#f5d76e);
    color: black;
    padding: 15px 40px;
    border-radius: 50px;
    border: none;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-proceed:hover {
    transform: scale(1.07);
    box-shadow: 0 0 25px var(--primary-gold);
}

/* FORM */
.container {
    background: var(--glass);
    max-width: 550px;
    width: 100%;
    padding: 50px;
    border-radius: 20px;
    border: 1px solid rgba(212,175,55,0.3);
    box-shadow: 0 0 20px var(--gold-glow);
}

.logo-container {
    text-align: center;
}

.logo-container img {
    max-width: 130px;
    filter: drop-shadow(0 0 15px var(--primary-gold));
}

h1 {
    text-align: center;
    color: var(--primary-gold);
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: #111;
    border: 1px solid rgba(212,175,55,0.3);
    color: white;
}

/* BUTTON */
#submitBtn {
    width: 100%;
    padding: 15px;
    border: 2px solid var(--primary-gold);
    background: transparent;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#submitBtn:hover {
    background: var(--primary-gold);
    color: black;
}

/* MODAL */
#rules-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
}

.rules-content {
    background: #111;
    border: 2px solid var(--primary-gold);
    padding: 30px;
    border-radius: 15px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro-overlay">
<div class="intro-content">

<div class="intro-logo">
<img src="clan.jpg">
</div>

<h2 class="intro-title">4SYNARIS</h2>

<p class="intro-text">
Elite Bloodstrike clan focused on skill, discipline, and domination.
</p>

<div class="leadership-grid">

<div class="leader-card">
<img src="hisae.jpg" class="leader-img">
<span class="leader-role">Owner</span>
<span class="leader-name">Hisae</span>
</div>

<div class="leader-card">
<img src="shianks.jpg" class="leader-img">
<span class="leader-role">Vice Leader</span>
<span class="leader-name">Shianks</span>
</div>

<div class="leader-card">
<img src="sushi.jpg" class="leader-img">
<span class="leader-role">Moderator</span>
<span class="leader-name">Sushi</span>
</div>

</div>

<button class="btn-proceed" onclick="enterRecruitment()">Enter Recruitment</button>

</div>
</div>

<!-- FORM -->
<div class="container">

<div class="logo-container">
<img src="clan.jpg">
</div>

<h1>4SYN Recruitment</h1>

<form id="recruitmentForm">

<input type="text" id="ign" placeholder="IGN" required>
<input type="text" id="uid" placeholder="UID" required>

<select id="hasMic" required>
<option value="">Mic?</option>
<option>Yes</option>
<option>No</option>
</select>

<textarea id="whyJoin" placeholder="Why join?" required></textarea>

<button type="submit" id="submitBtn">Submit</button>

</form>

</div>

<!-- MODAL -->
<div id="rules-modal">
<div class="rules-content">
<p>Agree to rules?</p>
<button onclick="confirmAndSubmit()">Agree</button>
</div>
</div>

<script>
function enterRecruitment(){
document.getElementById("intro-overlay").style.display="none";
}

const form=document.getElementById("recruitmentForm");
const modal=document.getElementById("rules-modal");

form.addEventListener("submit",e=>{
e.preventDefault();
modal.style.display="flex";
});

function confirmAndSubmit(){
alert("Submitted!");
location.reload();
}
</script>

</body>
</html>
