<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tournament Scorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7289da; padding-bottom: 15px; margin-bottom: 20px; }
        .map-badge { background: #7289da; padding: 8px 20px; border-radius: 5px; font-weight: bold; font-size: 1.1em; }
        
        /* Layout Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: #252525; margin-bottom: 10px; }
        th, td { padding: 10px; border: 1px solid #333; text-align: center; }
        th { background: #111; color: #7289da; font-size: 0.85em; text-transform: uppercase; }

        .winners-box { background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid #f1c40f; margin-bottom: 20px; }
        .podium { display: flex; justify-content: space-around; text-align: center; margin-top: 10px; }
        .gold { color: #f1c40f; font-weight: bold; } .silver { color: #bdc3c7; } .bronze { color: #cd7f32; }

        .history-log { background: #111; padding: 15px; border-radius: 8px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 0.9em; border: 1px solid #333; }
        .log-entry { border-bottom: 1px solid #222; padding: 5px 0; color: #aaa; }

        /* Remove Arrows/Spinners from Number Inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; } /* Firefox */

        input { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 60px; text-align: center; }
        .team-input { width: 150px; text-align: left; }

        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-update { background: #27ae60; color: white; width: 100%; margin-top: 10px; font-size: 1em; }
        .btn-reset { background: #c0392b; color: white; font-size: 0.8em; }
        .btn-ss { background: #9b59b6; color: white; margin-left: 10px; }

        /* Screenshot Mode Hide */
        .ss-hidden { display: block; }
        body.screenshot-mode { background: #000; }
        body.screenshot-mode .ss-hidden { display: none !important; }
        body.screenshot-mode .container { border: 2px solid #7289da; width: 800px; }
        body.screenshot-mode .main-grid { grid-template-columns: 1fr; }
        
        #exitSS { display: none; position: fixed; top: 10px; right: 10px; background: #e74c3c; z-index: 1000; }
        body.screenshot-mode #exitSS { display: block; }
    </style>
</head>
<body>

<button id="exitSS" class="btn" onclick="toggleSS()">Exit Screenshot Mode</button>

<div class="container">
    <div class="header">
        <div>
            <h2>🏆 Tournament Master</h2>
            <span id="dateTime"></span>
        </div>
        <div id="mapCounter" class="map-badge">MAP 1</div>
    </div>

    <div class="winners-box">
        <h3 style="margin:0; text-align: center;">⭐ TOP 3 STANDINGS ⭐</h3>
        <div class="podium" id="podiumUI">
            <div class="silver">🥈 2nd: ---</div>
            <div class="gold" style="font-size: 1.4em;">🥇 CHAMPION: ---</div>
            <div class="bronze">🥉 3rd: ---</div>
        </div>
    </div>

    <div class="main-grid">
        <div>
            <div class="ss-hidden" style="margin-bottom: 15px;">
                <label>Teams:</label>
                <input type="number" id="teamCount" value="20">
                <button onclick="setupTeams()" class="btn" style="background: #3498db; color: white; padding: 8px 15px;">Set Lobby</button>
                <button onclick="toggleSS()" class="btn btn-ss">📸 Screenshot Mode</button>
                <button onclick="fullReset()" class="btn btn-reset" style="float: right;">Full Reset</button>
            </div>

            <div id="setupSection" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th class="ss-mode-rank">Rank</th>
                            <th>Team Name</th>
                            <th class="ss-hidden">Rank (1-10)</th>
                            <th class="ss-hidden">Kills</th>
                            <th>Total Points</th>
                        </tr>
                    </thead>
                    <tbody id="entryBody"></tbody>
                </table>
                <button class="btn btn-update ss-hidden" onclick="processMap()">RECORD MAP & SYNC DISCORD</button>
            </div>
        </div>

        <div class="history-sidebar ss-hidden">
            <h3>📜 History Log</h3>
            <div class="history-log" id="historyLog">
                <div class="log-entry">Waiting for Match 1...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1465319966214717551/TJkxG_fCB0JRQqM2u8dgK3WhmMMERJE8SoZjiC_LHqmfdG1PCg6vgVGecztN0v8r77O4";
    
    let teams = [];
    let currentMap = 1;
    const placementPoints = { 1:10, 2:8, 3:6, 4:4, 5:4, 6:2, 7:1, 8:1, 9:1, 10:1 };

    function updateTime() {
        document.getElementById('dateTime').innerText = new Date().toLocaleString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    function toggleSS() {
        document.body.classList.toggle('screenshot-mode');
    }

    function setupTeams() {
        const count = document.getElementById('teamCount').value;
        const entryBody = document.getElementById('entryBody');
        entryBody.innerHTML = '';
        teams = [];

        for (let i = 1; i <= count; i++) {
            teams.push({ name: `Team ${i}`, totalPoints: 0 });
            addTeamRow(i, `Team ${i}`);
        }
        document.getElementById('setupSection').style.display = 'block';
    }

    function addTeamRow(id, name) {
        const entryBody = document.getElementById('entryBody');
        entryBody.innerHTML += `
            <tr id="row-${id}">
                <td class="display-rank">${id}</td>
                <td><input type="text" value="${name}" id="name-${id}" class="team-input"></td>
                <td class="ss-hidden"><input type="number" id="rank-${id}" placeholder="0"></td>
                <td class="ss-hidden"><input type="number" id="kills-${id}" placeholder="0"></td>
                <td id="total-${id}" style="font-weight:bold; color:#27ae60;">0</td>
            </tr>
        `;
    }

    function processMap() {
        let logText = `<strong>MAP ${currentMap} Results:</strong><br>`;
        
        // 1. Calculate Points
        teams.forEach((t, index) => {
            const i = index + 1;
            const rVal = document.getElementById(`rank-${i}`).value;
            const kVal = document.getElementById(`kills-${i}`).value;
            
            const r = parseInt(rVal) || 0;
            const k = parseInt(kVal) || 0;
            const p = (r > 0 && r <= 10) ? placementPoints[r] : 0;
            const mapTotal = p + k;

            t.name = document.getElementById(`name-${i}`).value;
            t.totalPoints += mapTotal;

            if (mapTotal > 0) {
                logText += `${t.name}: +${mapTotal}pts (Rank ${r}, ${k} kills)<br>`;
            }

            // Reset inputs
            document.getElementById(`rank-${i}`).value = "";
            document.getElementById(`kills-${i}`).value = "";
        });

        // 2. Sort Teams by Total Points
        teams.sort((a, b) => b.totalPoints - a.totalPoints);

        // 3. Refresh Table and Podium
        refreshUI();
        addToHistory(logText);
        sendDiscord();
        
        currentMap++;
        document.getElementById('mapCounter').innerText = `MAP ${currentMap}`;
    }

    function refreshUI() {
        const entryBody = document.getElementById('entryBody');
        entryBody.innerHTML = '';
        teams.forEach((t, index) => {
            const i = index + 1;
            entryBody.innerHTML += `
                <tr>
                    <td>${i}</td>
                    <td><input type="text" value="${t.name}" id="name-${i}" class="team-input"></td>
                    <td class="ss-hidden"><input type="number" id="rank-${i}" placeholder="0"></td>
                    <td class="ss-hidden"><input type="number" id="kills-${i}" placeholder="0"></td>
                    <td id="total-${i}" style="font-weight:bold; color:#27ae60;">${t.totalPoints}</td>
                </tr>
            `;
        });

        const pUI = document.getElementById('podiumUI');
        if (teams.length >= 3) {
            pUI.innerHTML = `
                <div class="silver">🥈 2nd: ${teams[1].name} (${teams[1].totalPoints})</div>
                <div class="gold" style="font-size: 1.4em;">🥇 CHAMPION: ${teams[0].name} (${teams[0].totalPoints})</div>
                <div class="bronze">🥉 3rd: ${teams[2].name} (${teams[2].totalPoints})</div>
            `;
        }
    }

    function addToHistory(html) {
        const log = document.getElementById('historyLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = html;
        log.prepend(entry);
    }

    async function sendDiscord() {
        const sorted = [...teams].slice(0, 10);
        let content = `**🏆 STANDINGS AFTER MAP ${currentMap}**\n`;
        sorted.forEach((t, i) => {
            let icon = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "▪️";
            content += `${icon} **${t.name}**: ${t.totalPoints} total pts\n`;
        });
        await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content }) });
    }

    function fullReset() {
        if(confirm("Wipe all data?")) {
            currentMap = 1;
            document.getElementById('mapCounter').innerText = "MAP 1";
            document.getElementById('historyLog').innerHTML = "";
            setupTeams();
            document.getElementById('podiumUI').innerHTML = '<div class="silver">🥈 2nd: ---</div><div class="gold" style="font-size: 1.4em;">🥇 CHAMPION: ---</div><div class="bronze">🥉 3rd: ---</div>';
        }
    }
</script>
</body>
</html>
